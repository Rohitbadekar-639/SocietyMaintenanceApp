spring.application.name=identity-service
server.port=${PORT:8081}

# ---- Active profile ----
# Default "h2" = empty in-memory DB (quick smoke tests only).
# For your real Neon users/data locally, do NOT use plain `mvn spring-boot:run`.
# Use:  .\scripts\start-backend-neon.ps1 -Service identity
#       .\scripts\start-backend-neon.ps1 -Service core
spring.profiles.active=h2

# ---- Shared JWT config (MUST match core-service) ----
# Override in production via environment variable JWT_SECRET
security.jwt.secret=${JWT_SECRET:ChangeMeToA256BitBase64SecretForSocietyAppProductionUseEnvVar!!}
security.jwt.expiration-ms=86400000

# ---- CORS (React dev server) ----
app.cors.allowed-origins=http://localhost:5173,http://localhost:3000

# ---- JPA ----
spring.jpa.open-in-view=false
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.format_sql=true
